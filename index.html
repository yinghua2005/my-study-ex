<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>任务管理系统</title>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body {background:#f5f7fa;padding:15px;}
    .container {max-width:100%;margin:0 auto;}

    .header-row {display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;background:#fff;padding:12px 15px;border-radius:8px;box-shadow:0 1px 3px #00000015;margin-bottom:15px;}
    .filter-wrap {display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
    select,input[type="date"] {padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;}
    .btn {padding:6px 14px;border-radius:4px;border:none;cursor:pointer;font-size:13px;}
    .btn-add {background:#28a745;color:#fff;}
    .btn-normal {background:#007bff;color:#fff;}

    .task-container {display:flex;flex-direction:column;gap:6px;}
    .task-card {
      width: 100% !important; 
      background:#fff;
      border-radius:6px;
      box-shadow:0 1px 4px #00000015;
      border-left:4px solid #007bff;
      padding:8px 10px;
      position:relative;
      overflow:hidden;
    }

    .level-indent-1 { margin-left:0px; width:100% !important; }
    .level-indent-2 { margin-left:30px; width:calc(100% - 30px) !important; }
    .level-indent-3 { margin-left:60px; width:calc(100% - 60px) !important; }
    .level-indent-4 { margin-left:90px; width:calc(100% - 90px) !important; }
    .level-indent-5 { margin-left:120px; width:calc(100% - 120px) !important; }

    .task-title {
      font-size:14px;
      font-weight:bold;
      color:#000;
      background:transparent;
      padding:0;
      margin:0 0 3px 0;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:space-between;
    }
    .title-left {display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

    .fold-btn {
      width:16px;
      height:16px;
      border:none;
      background:transparent;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      font-size:10px;
    }
    .fold-btn::before {content:"▶";}
    .fold-btn.open::before {content:"▼";}
    .fold-empty {width:16px;height:16px;display:inline-block;}

    .level-tag {
      padding:2px 6px;
      border-radius:3px;
      font-size:13px;
      font-weight:bold;
      color:#fff;
    }
    .level1{background:#007bff;}
    .level2{background:#28a745;}
    .level3{background:#fd7e14;}
    .level4{background:#6f42c1;}
    .level5{background:#dc3545;}

    .manager-tag {
      background: #eef4ff;
      color: #007bff;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 13px;
      font-weight: normal;
    }

    .cust-tag {
      background:#d1ecf1;
      color:#0c5460;
      padding:2px 6px;
      border-radius:3px;
      font-size:13px;
      font-weight:normal;
    }
    .device-tag {
      background:#d4edda;
      color:#155724;
      padding:2px 6px;
      border-radius:3px;
      font-size:13px;
      font-weight:normal;
    }
    .code-tag {
      background:#fff3cd;
      color:#856404;
      padding:2px 6px;
      border-radius:3px;
      font-size:13px;
      font-weight:normal;
    }

    .card-row {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      font-size:13px;
      margin-top:4px;
      width:100%;
    }
    .card-item {white-space:nowrap;}
    .progress-mini {width:80px;height:6px;background:#eee;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;}
    .progress-val {height:100%;background:#28a745;}
    .status-badge {padding:2px 6px;border-radius:3px;font-size:12px;color:#fff;}
    .wait {background:#6c757d;}
    .ing {background:#007bff;}
    .overdue {background:#dc3545;}
    .done {background:#28a745;}
    .pause {background:#fd7e14;}
    .cancel {background:#343a40;}

    .card-btns {display:flex;gap:6px;margin-left:auto;}
    .card-btns button {padding:3px 7px;font-size:12px;border:none;border-radius:3px;cursor:pointer;}
    .btn-edit {background:#007bff;color:#fff;}
    .btn-del {background:#dc3545;color:#fff;}
    .btn-sub {background:#6c757d;color:#fff;}

    .btn-gantt-l1 {
      min-width: 150px;
      height: 22px;
      line-height: 22px;
      padding: 0 6px;
      background: #6f42c1;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
    }

    .remark-line {font-size:13px;color:#666;white-space:nowrap;}

    .modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999;}
    .modal-box {background:#fff;padding:20px;border-radius:8px;width:92%;max-width:850px;max-height:100vh;overflow-y:auto;}
    .modal h3 {margin-bottom:15px;font-size:16px;}
    .form-grid {display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:15px;}
    .form-row {display:flex;align-items:center;gap:10px;margin-bottom:15px;}
    .form-group {display:flex;flex-direction:column;gap:4px;}
    label {font-size:13px;font-weight:bold;}
    input,textarea,select {padding:7px;border:1px solid #ddd;border-radius:4px;font-size:13px;}
    textarea.task-content {height:40px;resize:vertical;}
    textarea.remark-content {height:80px;resize:vertical;}
    input[type="range"] {width:100%;}
    .modal-btn-group {margin-top:15px;display:flex;gap:10px;}
    .close-btn {background:#6c757d;color:#fff;}
    .row3 {display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}

    .input-with-select {
      position: relative;
      width: 100%;
    }
    .input-with-select input {
      width: 100%;
      box-sizing: border-box;
      padding-right:24px;
    }
    .input-with-select .arrow {
      position: absolute;
      right:6px; top:50%; transform:translateY(-50%); font-size:12px; color:#666; pointer-events:none;
    }
    .input-with-select .option-list {
      position: absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #ddd; border-radius:4px; max-height:160px; overflow-y:auto; z-index:9999; display:none;
    }
    .input-with-select .option-list div {
      padding:6px 8px; cursor:pointer;
    }
    .input-with-select .option-list div:hover {
      background:#f5f5f5;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div class="filter-wrap">
      <select id="fCustomer"><option value="">全部客户</option></select>
      <select id="fDevice"><option value="">全部设备类型</option></select>
      <select id="fDeviceCode"><option value="">全部设备编号</option></select>
      <select id="fStatus"><option value="">全部状态</option><option>待开始</option><option>进行中</option><option>已逾期</option><option>已完成</option><option>暂停中</option><option>已取消</option></select>
      <input type="date" id="filterStartDate">
      <span>至</span>
      <input type="date" id="filterEndDate">
      <button class="btn btn-normal" onclick="loadTasks()">筛选</button>
    </div>
    <button class="btn btn-add" onclick="openNewTask()">新建任务</button>
  </div>

  <div class="task-container" id="taskContainer"></div>
</div>

<div class="modal" id="taskModal">
  <div class="modal-box">
    <h3 id="modalTitle">新建任务</h3>
    <input type="hidden" id="editId">
    <input type="hidden" id="parentId">

    <div class="form-grid">
      <div class="form-group">
        <label>客户名称</label>
        <div class="input-with-select">
          <input type="text" id="customer" autocomplete="off">
          <span class="arrow">▼</span>
          <div class="option-list" id="optCustomer"></div>
        </div>
      </div>
      <div class="form-group">
        <label>设备类型</label>
        <div class="input-with-select">
          <input type="text" id="deviceType" autocomplete="off">
          <span class="arrow">▼</span>
          <div class="option-list" id="optDevice"></div>
        </div>
      </div>
      <div class="form-group">
        <label>设备编号</label>
        <input id="deviceCode">
      </div>
      <div class="form-group">
        <label>设备序列号</label>
        <input id="serial">
      </div>
      <div class="form-group">
        <label>负责人</label>
        <div class="input-with-select">
          <input type="text" id="manager" autocomplete="off">
          <span class="arrow">▼</span>
          <div class="option-list" id="optManager"></div>
        </div>
      </div>
      <div class="form-group">
        <label>任务层级</label>
        <select id="level"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:15px;">
      <label>任务内容</label>
      <textarea id="taskContent" class="task-content"></textarea>
    </div>

    <div class="row3">
      <div class="form-group"><label>计划开始</label><input type="date" id="planStart" onchange="calcPlanDays()"></div>
      <div class="form-group"><label>计划结束</label><input type="date" id="planEnd" onchange="calcPlanDays()"></div>
      <div class="form-group"><label>计划工期（天）</label><input id="planHour" readonly></div>
    </div>
    <div class="row3">
      <div class="form-group"><label>实际开始</label><input type="date" id="realStart" onchange="calcRealDays()"></div>
      <div class="form-group"><label>实际结束</label><input type="date" id="realEnd" onchange="calcRealDays()"></div>
      <div class="form-group"><label>实际工期（天）</label><input id="realHour" readonly></div>
    </div>

    <div class="form-row" style="align-items:center;">
      <div class="form-group" style="flex:1;">
        <label>进度：<span id="progressText">0%</span></label>
        <input type="range" min="0" max="100" value="0" oninput="progressChange()" id="progressSlider">
      </div>
      <div class="form-group" style="width:180px;">
        <label>任务状态</label>
        <select id="status">
          <option>待开始</option><option>进行中</option><option>已逾期</option><option>已完成</option><option>暂停中</option><option>已取消</option>
        </select>
      </div>
    </div>

    <div class="form-group" style="margin-top:15px;">
      <label>备注</label>
      <textarea id="remark" class="remark-content"></textarea>
    </div>

    <div class="modal-btn-group">
      <button class="btn btn-normal" onclick="saveTask()">保存</button>
      <button class="btn close-btn" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>

<script>
let foldState = {};

// 进度条变化 → 自动更新状态
function progressChange(){
  let val = parseInt(document.getElementById('progressSlider').value);
  document.getElementById('progressText').innerText = val+'%';
  
  if(val === 0){
    document.getElementById('status').value = '待开始';
  } else if(val === 100){
    document.getElementById('status').value = '已完成';
  } else {
    document.getElementById('status').value = '进行中';
  }
}

// 计算计划工期天数
function calcPlanDays() {
  let s = document.getElementById('planStart').value;
  let e = document.getElementById('planEnd').value;
  if (!s || !e) { document.getElementById('planHour').value = ''; return; }
  let start = new Date(s);
  let end = new Date(e);
  let days = (end - start) / (1000*60*60*24) + 1;
  document.getElementById('planHour').value = days > 0 ? days : '';
}

// 计算实际工期天数
function calcRealDays() {
  let s = document.getElementById('realStart').value;
  let e = document.getElementById('realEnd').value;
  if (!s || !e) { document.getElementById('realHour').value = ''; return; }
  let start = new Date(s);
  let end = new Date(e);
  let days = (end - start) / (1000*60*60*24) + 1;
  document.getElementById('realHour').value = days > 0 ? days : '';
}

function getHistory(field) {
  let all = JSON.parse(localStorage.getItem('tasks') || []);
  return [...new Set(all.map(t => t[field]).filter(v => v && v.trim()))];
}

function initInputSelect(inputId, listId, field) {
  let input = document.getElementById(inputId);
  let list = document.getElementById(listId);
  let data = getHistory(field);
  list.innerHTML = '';
  data.forEach(item => {
    let d = document.createElement('div');
    d.textContent = item;
    d.onclick = () => { input.value = item; list.style.display = 'none'; };
    list.appendChild(d);
  });
  input.onclick = () => list.style.display = data.length ? 'block' : 'none';
  document.addEventListener('click', (e) => {
    if (!input.contains(e.target) && !list.contains(e.target)) list.style.display = 'none';
  });
}

function loadAllSelect() {
  initInputSelect('customer', 'optCustomer', 'customer');
  initInputSelect('deviceType', 'optDevice', 'deviceType');
  initInputSelect('manager', 'optManager', 'manager');
}

function openL1Gantt(l1Id){
  let fCustomer = document.getElementById('fCustomer').value;
  let fDevice = document.getElementById('fDevice').value;
  let fDeviceCode = document.getElementById('fDeviceCode').value;
  let fStatus = document.getElementById('fStatus').value;
  let sDate = document.getElementById('filterStartDate').value;
  let eDate = document.getElementById('filterEndDate').value;
  window.open(`gantt.html?l1Id=${l1Id}&cust=${encodeURIComponent(fCustomer)}&device=${encodeURIComponent(fDevice)}&code=${encodeURIComponent(fDeviceCode)}&status=${encodeURIComponent(fStatus)}&sdate=${sDate}&edate=${eDate}`, '_blank');
}

function loadFilterOption(){
  let tasks = JSON.parse(localStorage.getItem('tasks')||[]);
  let cust = [...new Set(tasks.map(x=>x.customer).filter(Boolean))];
  let dev = [...new Set(tasks.map(x=>x.deviceType).filter(Boolean))];
  let code = [...new Set(tasks.map(x=>x.deviceCode).filter(Boolean))];
  
  let fCust = document.getElementById('fCustomer');
  let fDev = document.getElementById('fDevice');
  let fCode = document.getElementById('fDeviceCode');
  
  fCust.innerHTML = '<option value="">全部客户</option>';
  fDev.innerHTML = '<option value="">全部设备类型</option>';
  fCode.innerHTML = '<option value="">全部设备编号</option>';
  
  cust.forEach(item=>fCust.innerHTML += `<option value="${item}">${item}</option>`);
  dev.forEach(item=>fDev.innerHTML += `<option value="${item}">${item}</option>`);
  code.forEach(item=>fCode.innerHTML += `<option value="${item}">${item}</option>`);
}

// ====================== 核心修复：L1 父任务自动跟随子任务更新 ======================
function calcAllParentProgressAndStatus() {
  let all = JSON.parse(localStorage.getItem('tasks') || '[]');

  // 递归计算子任务 → 更新父任务进度 & 状态
  function updateParent(taskId) {
    let children = all.filter(t => t.parentId === taskId);
    if (children.length === 0) return;

    // 先递归更新所有子任务
    children.forEach(c => updateParent(c.id));

    // 计算父任务进度
    let total = children.length;
    let completedCount = children.filter(c => c.status === '已完成').length;
    let progress = total > 0 ? Math.round((completedCount / total) * 100) : 0;

    // 找到父任务
    let parent = all.find(t => t.id === taskId);
    if (!parent) return;

    // 更新进度
    parent.progress = progress;

    // 自动更新父任务状态
    if (progress === 100) {
      parent.status = '已完成';
    } else if (progress > 0 && progress < 100) {
      parent.status = '进行中';
    } else {
      parent.status = '待开始';
    }
  }

  // 只更新 L1 顶层任务
  let topTasks = all.filter(t => !t.parentId);
  topTasks.forEach(t => updateParent(t.id));

  localStorage.setItem('tasks', JSON.stringify(all));
}

// 逾期规则
function autoSetOverdueStatus(task) {
  if (task.status === '已完成') {
    return '已完成';
  }
  if (!task.planEnd) return task.status;
  
  let now = new Date();
  now.setHours(0,0,0,0);
  let planEndDate = new Date(task.planEnd);
  planEndDate.setHours(0,0,0,0);

  if (now > planEndDate) {
    return '已逾期';
  }
  return task.status;
}

// 根据进度自动修正状态
function autoFixStatusByProgress(task) {
  let p = Number(task.progress);
  if (p === 100) task.status = '已完成';
  else if (p > 0 && p < 100) task.status = '进行中';
  else if (p === 0) task.status = '待开始';
}

function loadTasks(){
  // 先自动计算所有 L1 父任务进度 + 状态（修复点）
  calcAllParentProgressAndStatus();
  
  loadFilterOption();
  let all = JSON.parse(localStorage.getItem('tasks')||[]);
  
  // 自动修正状态
  all.forEach(task => autoFixStatusByProgress(task));
  localStorage.setItem('tasks', JSON.stringify(all));

  let fCust = document.getElementById('fCustomer').value;
  let fDev = document.getElementById('fDevice').value;
  let fCode = document.getElementById('fDeviceCode').value;
  let fStatus = document.getElementById('fStatus').value;
  let sDate = document.getElementById('filterStartDate').value;
  let eDate = document.getElementById('filterEndDate').value;

  let list = all.filter(t=>{
    if(fCust && t.customer !== fCust) return false;
    if(fDev && t.deviceType !== fDev) return false;
    if(fCode && t.deviceCode !== fCode) return false;
    if(fStatus && t.status !== fStatus) return false;
    if(sDate && t.planStart && new Date(t.planStart) < new Date(sDate)) return false;
    if(eDate && t.planEnd && new Date(t.planEnd) > new Date(eDate)) return false;
    return true;
  });

  list.sort((a,b)=>{
    let da = a.planStart ? new Date(a.planStart) : new Date(9999,12,31);
    let db = b.planStart ? new Date(b.planStart) : new Date(9999,12,31);
    return da - db;
  });

  let container = document.getElementById('taskContainer');
  container.innerHTML = '';
  let rootList = list.filter(x=>!x.parentId);
  rootList.forEach(item=>renderTask(item,list));
}

function renderTask(task,allList){
  let level = parseInt(task.level)||1;
  let hasChild = allList.some(x=>x.parentId===task.id);
  let indentClass = 'level-indent-'+level;
  let realStatus = autoSetOverdueStatus(task);

  let l1FieldsHtml = '';
  if(level === 1){
    l1FieldsHtml = `
      <span class="cust-tag">${task.customer||'无客户'}</span>
      <span class="device-tag">${task.deviceType||'无设备'}</span>
      <span class="code-tag">${task.deviceCode||'无编号'}</span>
    `;
  }

  let ganttBtn = level === 1 
    ? `<button class="btn-gantt-l1" onclick="openL1Gantt(${task.id})">甘特图</button>` 
    : '';

  let remarkTxt = task.remark ? `<span class="remark-line">${task.remark}</span>` : '';

  let html = `
  <div class="task-card ${indentClass}">
    <div class="task-title">
      <div class="title-left">
        ${hasChild 
          ? `<button class="fold-btn ${foldState[task.id]?'open':''}" onclick="toggleFold(${task.id})"></button>` 
          : `<span class="fold-empty"></span>`
        }
        <span class="level-tag level${level}">L${level}</span>
        <span>${task.taskContent||'无任务内容'}</span>
        ${l1FieldsHtml}
        ${task.manager?`<span class="manager-tag">${task.manager}</span>`:''}
      </div>
      ${ganttBtn}
    </div>

    <div class="card-row">
      <div class="card-item">计划：${task.planStart||'-'} ~ ${task.planEnd||'-'}</div>
      <div class="card-item">
        <div class="progress-mini"><div class="progress-val" style="width:${task.progress||0}%"></div></div>
        <span style="margin-left:4px">${task.progress||0}%</span>
      </div>
      <div class="card-item"><span class="status-badge ${getStatusClass(realStatus)}">${realStatus}</span></div>
      ${remarkTxt}
      <div class="card-btns">
        <button class="btn-edit" onclick="editTask(${task.id})">编辑</button>
        <button class="btn-del" onclick="delTask(${task.id})">删除</button>
        <button class="btn-sub" onclick="addSubTask(${task.id})">加子任务</button>
      </div>
    </div>
  </div>
  `;
  document.getElementById('taskContainer').innerHTML += html;

  if(hasChild && foldState[task.id]){
    let childs = allList.filter(x=>x.parentId===task.id);
    childs.forEach(c=>renderTask(c,allList));
  }
}

function toggleFold(id){ foldState[id] = !foldState[id]; loadTasks(); }

function getStatusClass(s){
  if(s==='待开始') return 'wait'; 
  if(s==='进行中') return 'ing';
  if(s==='已逾期') return 'overdue'; 
  if(s==='已完成') return 'done';
  if(s==='暂停中') return 'pause'; 
  return 'cancel';
}

function closeModal(){document.getElementById('taskModal').style.display='none';}

function openNewTask(){
  loadAllSelect();
  document.getElementById('modalTitle').innerText='新建任务';
  document.getElementById('editId').value='';
  document.getElementById('parentId').value='';
  document.querySelectorAll('#taskModal input,#taskModal select,#taskModal textarea').forEach(i=>i.value='');
  document.getElementById('progressText').innerText='0%';
  document.getElementById('progressSlider').value = 0;
  document.getElementById('level').value=1;
  document.getElementById('status').value='待开始';
  document.getElementById('progressSlider').disabled = false; 
  document.getElementById('taskModal').style.display='flex';
}

function addSubTask(pid){
  let all = JSON.parse(localStorage.getItem('tasks')||[]);
  let p = all.find(x=>x.id===pid); if(!p)return;
  openNewTask();
  document.getElementById('modalTitle').innerText='添加子任务';
  document.getElementById('parentId').value=pid;
  document.getElementById('customer').value = p.customer||'';
  document.getElementById('deviceType').value = p.deviceType||'';
  document.getElementById('deviceCode').value = p.deviceCode||'';
  document.getElementById('serial').value = p.serial||'';
  document.getElementById('manager').value = p.manager||'';
  let nextLv = Math.min(parseInt(p.level)+1,5);
  document.getElementById('level').value=nextLv;
}

function editTask(id){
  let all = JSON.parse(localStorage.getItem('tasks')||[]);
  let t = all.find(x=>x.id===id); if(!t)return;
  let hasChild = all.some(x => x.parentId === id);
  
  loadAllSelect();
  openNewTask();
  document.getElementById('modalTitle').innerText='编辑任务';
  document.getElementById('editId').value=id;
  document.getElementById('parentId').value=t.parentId||'';
  document.getElementById('customer').value = t.customer||'';
  document.getElementById('deviceType').value = t.deviceType||'';
  document.getElementById('deviceCode').value = t.deviceCode||'';
  document.getElementById('serial').value = t.serial||'';
  document.getElementById('manager').value = t.manager||'';
  document.getElementById('level').value=t.level||1;
  document.getElementById('taskContent').value=t.taskContent||'';
  document.getElementById('remark').value=t.remark||'';
  document.getElementById('planStart').value=t.planStart||'';
  document.getElementById('planEnd').value=t.planEnd||'';
  document.getElementById('realStart').value=t.realStart||'';
  document.getElementById('realEnd').value=t.realEnd||'';
  document.getElementById('progressSlider').value = t.progress||0;
  document.getElementById('progressText').innerText = (t.progress||0)+'%';
  document.getElementById('status').value = t.status||'待开始';

  calcPlanDays();
  calcRealDays();

  if(hasChild) {
    document.getElementById('progressSlider').disabled = true;
  } else {
    document.getElementById('progressSlider').disabled = false;
  }
}

function saveTask(){
  let editId = document.getElementById('editId').value;
  let parentId = document.getElementById('parentId').value;
  let all = JSON.parse(localStorage.getItem('tasks')||[]);
  
  let task = {
    id:editId?Number(editId):Date.now(),
    parentId:parentId?Number(parentId):'',
    customer:document.getElementById('customer').value,
    deviceType:document.getElementById('deviceType').value,
    deviceCode:document.getElementById('deviceCode').value,
    serial:document.getElementById('serial').value,
    manager:document.getElementById('manager').value,
    level:document.getElementById('level').value,
    taskContent:document.getElementById('taskContent').value,
    remark:document.getElementById('remark').value,
    planStart:document.getElementById('planStart').value,
    planEnd:document.getElementById('planEnd').value,
    realStart:document.getElementById('realStart').value,
    realEnd:document.getElementById('realEnd').value,
    progress: document.getElementById('progressSlider').value,
    status:document.getElementById('status').value
  };

  autoFixStatusByProgress(task);

  if(editId){
    let idx = all.findIndex(x=>x.id===Number(editId));
    all[idx] = task;
  }else{
    all.push(task);
  }

  localStorage.setItem('tasks',JSON.stringify(all));
  closeModal();
  loadTasks();
}

function delTask(id){
  if(!confirm('确定删除该任务及子任务？'))return;
  let all = JSON.parse(localStorage.getItem('tasks')||[]);
  function delChilds(pid){
    all = all.filter(x=>x.id!==pid);
    all.filter(x=>x.parentId===pid).forEach(c=>delChilds(c.id));
  }
  delChilds(id);
  localStorage.setItem('tasks',JSON.stringify(all));
  loadTasks();
}

window.onload = function(){ loadTasks(); }
</script>
