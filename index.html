<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>任务管理系统-紧凑卡片层级版</title>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body {background:#f5f7fa;padding:15px;}
    .container {max-width:100%;margin:0 auto;}

    /* 顶部筛选+新建同行布局 */
    .header-row {display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;background:#fff;padding:12px 15px;border-radius:8px;box-shadow:0 1px 3px #00000015;margin-bottom:15px;}
    .filter-wrap {display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
    select {padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;min-width:130px;}
    .btn {padding:6px 14px;border-radius:4px;border:none;cursor:pointer;font-size:13px;}
    .btn-add {background:#28a745;color:#fff;}
    .btn-normal {background:#007bff;color:#fff;}

    /* 任务容器 */
    .task-container {display:flex;flex-direction:column;gap:10px;}
    /* 父任务卡片 横向铺满 */
    .task-card {width:100%;background:#fff;border-radius:6px;box-shadow:0 1px 4px #00000015;border-left:4px solid #007bff;padding:10px;}
    .task-card.l1 {border-left-color:#dc3545;}
    /* 子任务缩进 */
    .sub-task-wrap {margin-left:25px;margin-top:8px;border-left:2px dashed #ccc;padding-left:10px;}
    .sub-task-card {width:100%;background:#f8f9fa;border-radius:6px;padding:8px;margin-bottom:8px;border-left:3px solid #6c757d;}

    /* 卡片紧凑内容布局 横向排布 */
    .card-row {display:flex;flex-wrap:wrap;gap:12px;align-items:center;font-size:13px;}
    .card-item {white-space:nowrap;}
    .card-label {font-weight:bold;color:#333;margin-right:3px;}
    .progress-mini {width:80px;height:6px;background:#eee;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;}
    .progress-val {height:100%;background:#28a745;}
    .status-badge {padding:2px 6px;border-radius:3px;font-size:12px;color:#fff;}
    .wait {background:#6c757d;}
    .ing {background:#007bff;}
    .overdue {background:#dc3545;}
    .done {background:#28a745;}
    .pause {background:#fd7e14;}
    .cancel {background:#343a40;}

    /* 按钮组紧凑 */
    .card-btns {display:flex;gap:6px;margin-left:auto;}
    .card-btns button {padding:4px 8px;font-size:12px;border:none;border-radius:3px;cursor:pointer;}
    .btn-edit {background:#007bff;color:#fff;}
    .btn-del {background:#dc3545;color:#fff;}
    .btn-sub {background:#6c757d;color:#fff;}
    .btn-fold {background:#ffc107;color:#333;}

    /* 弹窗样式 */
    .modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999;}
    .modal-box {background:#fff;padding:20px;border-radius:8px;width:92%;max-width:850px;max-height:90vh;overflow-y:auto;}
    .modal h3 {margin-bottom:15px;font-size:16px;}
    .form-grid {display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:15px;}
    .form-group {display:flex;flex-direction:column;gap:4px;}
    label {font-size:13px;font-weight:bold;}
    input,textarea {padding:7px;border:1px solid #ddd;border-radius:4px;font-size:13px;}
    textarea {min-height:70px;resize:vertical;}
    input[type="range"] {width:100%;}
    .modal-btn-group {margin-top:15px;display:flex;gap:10px;}
    .close-btn {background:#6c757d;color:#fff;}
  </style>
</head>
<body>
<div class="container">
  <!-- 顶部：筛选+新建 同行紧凑布局 -->
  <div class="header-row">
    <div class="filter-wrap">
      <select id="fCustomer">
        <option value="">全部客户</option>
      </select>
      <select id="fDevice">
        <option value="">全部设备类型</option>
      </select>
      <select id="fLevel">
        <option value="">全部层级</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
      </select>
      <select id="fStatus">
        <option value="">全部任务状态</option>
        <option>待开始</option>
        <option>进行中</option>
        <option>已逾期</option>
        <option>已完成</option>
        <option>暂停中</option>
        <option>已取消</option>
      </select>
      <button class="btn btn-normal" onclick="loadTasks()">筛选</button>
    </div>
    <button class="btn btn-add" onclick="openNewTask()">新建任务</button>
  </div>

  <!-- 任务层级列表容器 -->
  <div class="task-container" id="taskContainer"></div>
</div>

<!-- 新建/编辑弹窗 -->
<div class="modal" id="taskModal">
  <div class="modal-box">
    <h3 id="modalTitle">新建任务</h3>
    <input type="hidden" id="editId">
    <input type="hidden" id="parentId">

    <div class="form-grid">
      <div class="form-group"><label>客户名称</label><input id="customer"></div>
      <div class="form-group"><label>设备类型</label><input id="deviceType"></div>
      <div class="form-group"><label>设备编号</label><input id="deviceCode"></div>
      <div class="form-group"><label>设备序列号</label><input id="serial"></div>
      <div class="form-group"><label>负责人</label><input id="manager"></div>
      <div class="form-group">
        <label>任务层级</label>
        <select id="level"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
      </div>
      <div class="form-group" style="grid-column:span 2;">
        <label>任务内容</label>
        <textarea id="taskContent"></textarea>
      </div>
      <div class="form-group"><label>计划开始</label><input type="date" id="planStart" onchange="calcDays()"></div>
      <div class="form-group"><label>计划结束</label><input type="date" id="planEnd" onchange="calcDays()"></div>
      <div class="form-group"><label>计划工期（天）</label><input id="planHour" readonly></div>
      <div class="form-group"><label>实际开始</label><input type="date" id="realStart"></div>
      <div class="form-group"><label>实际结束</label><input type="date" id="realEnd"></div>
      <div class="form-group"><label>实际工期</label><input id="realHour"></div>
      <div class="form-group">
        <label>进度：<span id="progressText">0%</span></label>
        <input type="range" id="progress" min="0" max="100" value="0" oninput="showProgress()">
      </div>
      <div class="form-group">
        <label>任务状态</label>
        <select id="status">
          <option>待开始</option><option>进行中</option><option>已逾期</option><option>已完成</option><option>暂停中</option><option>已取消</option>
        </select>
      </div>
    </div>
    <div class="modal-btn-group">
      <button class="btn btn-normal" onclick="saveTask()">保存</button>
      <button class="btn close-btn" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>

<script>
// 存储折叠状态
let foldState = {};

// 自动计算工期
function calcDays() {
  let s = document.getElementById('planStart').value;
  let e = document.getElementById('planEnd').value;
  if (!s || !e) return;
  let days = Math.ceil((new Date(e) - new Date(s)) / (1000*60*60*24)) + 1;
  document.getElementById('planHour').value = days > 0 ? days + ' 天' : '1 天';
}

// 进度条显示
function showProgress() {
  let v = document.getElementById('progress').value;
  document.getElementById('progressText').innerText = v + '%';
}

// 打开新建
function openNewTask() {
  document.getElementById('modalTitle').innerText = '新建任务';
  document.getElementById('editId').value = '';
  document.getElementById('parentId').value = '';
  document.querySelectorAll('#taskModal input, #taskModal select, #taskModal textarea').forEach(i => i.value = '');
  document.getElementById('progressText').innerText = '0%';
  document.getElementById('taskModal').style.display = 'flex';
}

// 新建子任务
function openSubTask(parentId) {
  openNewTask();
  document.getElementById('parentId').value = parentId;
  document.getElementById('modalTitle').innerText = '新建子任务';
}

// 编辑任务
function openEdit(id) {
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let t = tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('modalTitle').innerText = '编辑任务';
  document.getElementById('editId').value = id;
  document.getElementById('parentId').value = t.parentId || '';
  document.getElementById('customer').value = t.customer || '';
  document.getElementById('deviceType').value = t.deviceType || '';
  document.getElementById('deviceCode').value = t.deviceCode || '';
  document.getElementById('serial').value = t.serial || '';
  document.getElementById('manager').value = t.manager || '';
  document.getElementById('level').value = t.level || '1';
  document.getElementById('taskContent').value = t.taskContent || '';
  document.getElementById('planStart').value = t.planStart || '';
  document.getElementById('planEnd').value = t.planEnd || '';
  document.getElementById('planHour').value = t.planHour || '';
  document.getElementById('realStart').value = t.realStart || '';
  document.getElementById('realEnd').value = t.realEnd || '';
  document.getElementById('realHour').value = t.realHour || '';
  document.getElementById('progress').value = t.progress || 0;
  document.getElementById('progressText').innerText = (t.progress || 0) + '%';
  document.getElementById('status').value = t.status || '待开始';
  document.getElementById('taskModal').style.display = 'flex';
}

// 关闭弹窗
function closeModal() {
  document.getElementById('taskModal').style.display = 'none';
}

// 保存任务
function saveTask() {
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let id = document.getElementById('editId').value;
  let parentId = document.getElementById('parentId').value;
  let data = {
    customer: document.getElementById('customer').value,
    deviceType: document.getElementById('deviceType').value,
    deviceCode: document.getElementById('deviceCode').value,
    serial: document.getElementById('serial').value,
    manager: document.getElementById('manager').value,
    level: document.getElementById('level').value,
    taskContent: document.getElementById('taskContent').value,
    planStart: document.getElementById('planStart').value,
    planEnd: document.getElementById('planEnd').value,
    planHour: document.getElementById('planHour').value,
    realStart: document.getElementById('realStart').value,
    realEnd: document.getElementById('realEnd').value,
    realHour: document.getElementById('realHour').value,
    progress: document.getElementById('progress').value,
    status: document.getElementById('status').value,
    parentId: parentId ? Number(parentId) : null
  };
  if (id) {
    let idx = tasks.findIndex(x => x.id == id);
    tasks[idx] = { ...tasks[idx], ...data };
  } else {
    tasks.unshift({ id: Date.now(), ...data });
  }
  localStorage.setItem('tasks', JSON.stringify(tasks));
  closeModal();
  loadTasks();
}

// 加载客户、设备下拉选项
function loadFilterOptions() {
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let customers = [...new Set(tasks.map(t => t.customer).filter(Boolean))];
  let devices = [...new Set(tasks.map(t => t.deviceType).filter(Boolean))];
  
  let custSel = document.getElementById('fCustomer');
  custSel.innerHTML = '<option value="">全部客户</option>';
  customers.forEach(c => custSel.innerHTML += `<option value="${c}">${c}</option>`);

  let devSel = document.getElementById('fDevice');
  devSel.innerHTML = '<option value="">全部设备类型</option>';
  devices.forEach(d => devSel.innerHTML += `<option value="${d}">${d}</option>`);
}

// 删除任务
function deleteTask(id) {
  if (!confirm('确定删除该任务？')) return;
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  tasks = tasks.filter(t => t.id !== id && t.parentId !== id);
  localStorage.setItem('tasks', JSON.stringify(tasks));
  loadTasks();
}

// 折叠/展开子任务
function toggleFold(pid) {
  foldState[pid] = !foldState[pid];
  loadTasks();
}

// 渲染任务 层级+折叠+横向紧凑卡片
function loadTasks() {
  loadFilterOptions();
  let fCust = document.getElementById('fCustomer').value;
  let fDev = document.getElementById('fDevice').value;
  let fLev = document.getElementById('fLevel').value;
  let fStat = document.getElementById('fStatus').value;

  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  // 筛选
  let filtered = tasks.filter(t => {
    if(fCust && t.customer !== fCust) return false;
    if(fDev && t.deviceType !== fDev) return false;
    if(fLev && t.level !== fLev) return false;
    if(fStat && t.status !== fStat) return false;
    return true;
  });

  // 区分父任务L1 和 子任务
  let parentTasks = filtered.filter(t => t.level === '1' && !t.parentId);
  let subTasks = filtered.filter(t => t.parentId);

  let container = document.getElementById('taskContainer');
  container.innerHTML = '';

  // 状态样式
  function getStatusClass(s){
    if(s==='待开始')return 'wait';
    if(s==='进行中')return 'ing';
    if(s==='已逾期')return 'overdue';
    if(s==='已完成')return 'done';
    if(s==='暂停中')return 'pause';
    if(s==='已取消')return 'cancel';
    return '';
  }

  // 渲染单个卡片
  function renderCard(t, isSub=false){
    let html = `
      <div class="card-row">
        <div class="card-item"><span class="card-label">客户:</span>${t.customer||'-'}</div>
        <div class="card-item"><span class="card-label">设备:</span>${t.deviceType||'-'}</div>
        <div class="card-item"><span class="card-label">层级:</span>L${t.level}</div>
        <div class="card-item"><span class="card-label">负责人:</span>${t.manager||'-'}</div>
        <div class="card-item"><span class="card-label">工期:</span>${t.planHour||'-'}</div>
        <div class="card-item">
          <span class="card-label">进度:</span>
          <div class="progress-mini"><div class="progress-val" style="width:${t.progress}%"></div></div>
          ${t.progress}%
        </div>
        <div class="card-item"><span class="status-badge ${getStatusClass(t.status)}">${t.status}</span></div>
        <div class="card-btns">
          ${!isSub ? `<button class="btn-fold" onclick="toggleFold(${t.id})">${foldState[t.id]?'展开':'折叠'}</button>` : ''}
          ${t.level==='1'&&!isSub?`<button class="btn-sub" onclick="openSubTask(${t.id})">加子任务</button>`:''}
          <button class="btn-edit" onclick="openEdit(${t.id})">编辑</button>
          <button class="btn-del" onclick="deleteTask(${t.id})">删除</button>
        </div>
      </div>
      <div class="card-row" style="margin-top:6px;">
        <div class="card-item"><span class="card-label">内容:</span>${t.taskContent||'-'}</div>
      </div>
    `;
    return html;
  }

  // 遍历父任务
  parentTasks.forEach(p=>{
    let pCard = document.createElement('div');
    pCard.className = 'task-card l1';
    pCard.innerHTML = renderCard(p);
    container.appendChild(pCard);

    // 对应子任务
    let childs = subTasks.filter(s=>s.parentId === p.id);
    if(childs.length > 0){
      let subWrap = document.createElement('div');
      subWrap.className = 'sub-task-wrap';
      subWrap.id = 'subWrap_'+p.id;
      
      if(!foldState[p.id]){
        childs.forEach(c=>{
          let subCard = document.createElement('div');
          subCard.className = 'sub-task-card';
          subCard.innerHTML = renderCard(c,true);
          subWrap.appendChild(subCard);
        });
      }
      container.appendChild(subWrap);
    }
  });

  // 非L1独立任务（无父级）
  let aloneTasks = filtered.filter(t => t.level!=='1' && !t.parentId);
  aloneTasks.forEach(t=>{
    let card = document.createElement('div');
    card.className = 'task-card';
    card.innerHTML = renderCard(t);
    container.appendChild(card);
  });
}

window.onload = loadTasks;
</script>
</body>
</html>
