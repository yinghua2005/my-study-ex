<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>任务管理系统</title>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body {background:#f5f7fa;padding:20px;}
    .container {max-width:1400px;margin:0 auto;}
    .top-bar {display:flex;justify-content:space-between;align-items:center;background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 5px #00000010;}
    .top-bar h2 {color:#333;}
    .btn-add {background:#28a745;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;}
    .filter-bar {display:flex;flex-wrap:wrap;gap:10px;background:white;padding:15px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 5px #00000010;}
    select, input {padding:10px;border:1px solid #ddd;border-radius:6px;min-width:160px;}
    button {padding:10px 20px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer;}

    /* 卡片布局 */
    .task-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;}
    .task-card {background:white;border-radius:12px;padding:20px;box-shadow:0 2px 8px #00000010;border-left:5px solid #007bff;position:relative;}
    .task-card.l1 {border-left-color:#dc3545;}
    .task-card h4 {margin-bottom:10px;color:#222;}
    .task-card p {margin:6px 0;font-size:14px;color:#555;line-height:1.4;}
    .task-card .label {font-weight:bold;color:#333;display:inline-block;width:70px;}
    .task-card .progress-bar {height:8px;background:#eee;border-radius:4px;margin:8px 0;overflow:hidden;}
    .task-card .progress {height:100%;background:#28a745;border-radius:4px;}
    .task-card .badge {display:inline-block;padding:4px 8px;border-radius:4px;font-size:12px;color:white;background:#6c757d;margin-top:5px;}
    .badge.wait {background:#6c757d;}
    .badge.ing {background:#007bff;}
    .badge.overdue {background:#dc3545;}
    .badge.done {background:#28a745;}
    .badge.pause {background:#fd7e14;}
    .badge.cancel {background:#343a40;}

    .card-btns {display:flex;flex-wrap:wrap;gap:8px;margin-top:15px;}
    .card-btns button {padding:6px 10px;font-size:13px;}
    .btn-danger {background:#dc3545;}
    .btn-secondary {background:#6c757d;}

    /* 弹窗 */
    .modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999;}
    .modal-box {background:white;padding:25px;border-radius:10px;width:90%;max-width:900px;max-height:90vh;overflow-y:auto;}
    .modal h3 {margin-bottom:15px;}
    .form-grid {display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px;}
    .form-group {display:flex;flex-direction:column;gap:5px;}
    label {font-weight:bold;font-size:14px;}
    textarea {padding:10px;border:1px solid #ddd;border-radius:6px;min-height:80px;resize:vertical;}
    input[type="range"] {width:100%;}
    .modal-btn-group {margin-top:20px;display:flex;gap:10px;}
    .close-btn {background:#6c757d;}
  </style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <h2>任务管理系统</h2>
    <button class="btn-add" onclick="openNewTask()">新建任务</button>
  </div>

  <div class="filter-bar">
    <select id="fCustomer">
      <option value="">全部客户</option>
    </select>
    <select id="fLevel">
      <option value="">全部层级</option>
      <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
    </select>
    <button onclick="loadTasks()">筛选</button>
  </div>

  <!-- 卡片列表 -->
  <div class="task-grid" id="taskGrid"></div>
</div>

<!-- 弹窗 -->
<div class="modal" id="taskModal">
  <div class="modal-box">
    <h3 id="modalTitle">新建任务</h3>
    <input type="hidden" id="editId">
    <input type="hidden" id="parentId">

    <div class="form-grid">
      <div class="form-group"><label>客户名称</label><input id="customer"></div>
      <div class="form-group"><label>设备类型</label><input id="deviceType"></div>
      <div class="form-group"><label>设备编号</label><input id="deviceCode"></div>
      <div class="form-group"><label>设备序列号</label><input id="serial"></div>
      <div class="form-group"><label>负责人</label><input id="manager"></div>
      <div class="form-group">
        <label>任务层级</label>
        <select id="level"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
      </div>

      <div class="form-group" style="grid-column:span 2;">
        <label>任务内容</label>
        <textarea id="taskContent"></textarea>
      </div>

      <div class="form-group"><label>计划开始</label><input type="date" id="planStart" onchange="calcDays()"></div>
      <div class="form-group"><label>计划结束</label><input type="date" id="planEnd" onchange="calcDays()"></div>
      <div class="form-group"><label>计划工期（天）</label><input id="planHour" readonly></div>
      
      <div class="form-group"><label>实际开始</label><input type="date" id="realStart"></div>
      <div class="form-group"><label>实际结束</label><input type="date" id="realEnd"></div>
      <div class="form-group"><label>实际工期</label><input id="realHour"></div>

      <div class="form-group">
        <label>进度：<span id="progressText">0%</span></label>
        <input type="range" id="progress" min="0" max="100" value="0" oninput="showProgress()">
      </div>

      <div class="form-group">
        <label>任务状态</label>
        <select id="status">
          <option>待开始</option><option>进行中</option><option>已逾期</option><option>已完成</option><option>暂停中</option><option>已取消</option>
        </select>
      </div>
    </div>

    <div class="modal-btn-group">
      <button onclick="saveTask()">保存</button>
      <button class="close-btn" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>

<script>
// 自动计算工期
function calcDays() {
  let s = document.getElementById('planStart').value;
  let e = document.getElementById('planEnd').value;
  if (!s || !e) return;
  let days = Math.ceil((new Date(e) - new Date(s)) / (1000*60*60*24)) + 1;
  document.getElementById('planHour').value = days > 0 ? days + ' 天' : '1 天';
}

// 进度条显示
function showProgress() {
  let v = document.getElementById('progress').value;
  document.getElementById('progressText').innerText = v + '%';
}

// 打开新建
function openNewTask() {
  document.getElementById('modalTitle').innerText = '新建任务';
  document.getElementById('editId').value = '';
  document.getElementById('parentId').value = '';
  document.querySelectorAll('#taskModal input, #taskModal select, #taskModal textarea').forEach(i => i.value = '');
  document.getElementById('progressText').innerText = '0%';
  document.getElementById('taskModal').style.display = 'flex';
}

// 打开新建子任务
function openSubTask(parentId) {
  openNewTask();
  document.getElementById('parentId').value = parentId;
  document.getElementById('modalTitle').innerText = '新建子任务';
}

// 打开编辑
function openEdit(id) {
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let t = tasks.find(x => x.id === id);
  if (!t) return;

  document.getElementById('modalTitle').innerText = '编辑任务';
  document.getElementById('editId').value = id;
  document.getElementById('parentId').value = t.parentId || '';
  document.getElementById('customer').value = t.customer || '';
  document.getElementById('deviceType').value = t.deviceType || '';
  document.getElementById('deviceCode').value = t.deviceCode || '';
  document.getElementById('serial').value = t.serial || '';
  document.getElementById('manager').value = t.manager || '';
  document.getElementById('level').value = t.level || '1';
  document.getElementById('taskContent').value = t.taskContent || '';
  document.getElementById('planStart').value = t.planStart || '';
  document.getElementById('planEnd').value = t.planEnd || '';
  document.getElementById('planHour').value = t.planHour || '';
  document.getElementById('realStart').value = t.realStart || '';
  document.getElementById('realEnd').value = t.realEnd || '';
  document.getElementById('realHour').value = t.realHour || '';
  document.getElementById('progress').value = t.progress || 0;
  document.getElementById('progressText').innerText = (t.progress || 0) + '%';
  document.getElementById('status').value = t.status || '待开始';

  document.getElementById('taskModal').style.display = 'flex';
}

// 关闭弹窗
function closeModal() {
  document.getElementById('taskModal').style.display = 'none';
}

// 保存（新建/编辑/子任务）
function saveTask() {
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let id = document.getElementById('editId').value;
  let parentId = document.getElementById('parentId').value;

  let data = {
    customer: document.getElementById('customer').value,
    deviceType: document.getElementById('deviceType').value,
    deviceCode: document.getElementById('deviceCode').value,
    serial: document.getElementById('serial').value,
    manager: document.getElementById('manager').value,
    level: document.getElementById('level').value,
    taskContent: document.getElementById('taskContent').value,
    planStart: document.getElementById('planStart').value,
    planEnd: document.getElementById('planEnd').value,
    planHour: document.getElementById('planHour').value,
    realStart: document.getElementById('realStart').value,
    realEnd: document.getElementById('realEnd').value,
    realHour: document.getElementById('realHour').value,
    progress: document.getElementById('progress').value,
    status: document.getElementById('status').value,
    parentId: parentId || null
  };

  if (id) {
    let idx = tasks.findIndex(x => x.id == id);
    tasks[idx] = { ...tasks[idx], ...data };
  } else {
    tasks.unshift({ id: Date.now(), ...data });
  }

  localStorage.setItem('tasks', JSON.stringify(tasks));
  closeModal();
  loadTasks();
  alert('保存成功！');
}

// 加载客户下拉
function loadCustomerOptions() {
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let customers = [...new Set(tasks.map(t => t.customer).filter(Boolean))];
  let sel = document.getElementById('fCustomer');
  sel.innerHTML = '<option value="">全部客户</option>';
  customers.forEach(c => {
    let opt = document.createElement('option');
    opt.value = c;
    opt.innerText = c;
    sel.appendChild(opt);
  });
}

// 删除任务
function deleteTask(id) {
  if (!confirm('确定要删除此任务吗？')) return;
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem('tasks', JSON.stringify(tasks));
  loadTasks();
}

// 加载卡片
function loadTasks() {
  loadCustomerOptions();
  let fCust = document.getElementById('fCustomer').value;
  let fLev = document.getElementById('fLevel').value;
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

  let filtered = tasks.filter(t => {
    if (fCust && t.customer !== fCust) return false;
    if (fLev && t.level !== fLev) return false;
    return true;
  });

  let grid = document.getElementById('taskGrid');
  grid.innerHTML = '';

  filtered.forEach(t => {
    let card = document.createElement('div');
    card.className = 'task-card ' + (t.level == '1' ? 'l1' : '');
    
    let statusClass = '';
    if(t.status==='待开始') statusClass='wait';
    else if(t.status==='进行中') statusClass='ing';
    else if(t.status==='已逾期') statusClass='overdue';
    else if(t.status==='已完成') statusClass='done';
    else if(t.status==='暂停中') statusClass='pause';
    else if(t.status==='已取消') statusClass='cancel';

    card.innerHTML = `
      <h4>${t.customer || '-'}</h4>
      <p><span class="label">层级：</span>L${t.level}</p>
      <p><span class="label">设备：</span>${t.deviceType || '-'}</p>
      <p><span class="label">负责人：</span>${t.manager || '-'}</p>
      <p><span class="label">工期：</span>${t.planHour || '-'}</p>
      <p><span class="label">内容：</span>${t.taskContent || '-'}</p>
      <div class="progress-bar">
        <div class="progress" style="width:${t.progress}%"></div>
      </div>
      <p>进度：${t.progress}%</p>
      <span class="badge ${statusClass}">${t.status}</span>
      <div class="card-btns">
        <button onclick="openEdit(${t.id})">编辑</button>
        <button class="btn-danger" onclick="deleteTask(${t.id})">删除</button>
        ${t.level == '1' ? `<button class="btn-secondary" onclick="openSubTask(${t.id})">加子任务</button>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

// 初始化
window.onload = loadTasks;
</script>
</body>
</html>
